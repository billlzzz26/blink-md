name: Repository Policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-policy/policy@v2
        with:
          policy: github/billlzzz26/blink-md/.github/policies/repository-policy.yml