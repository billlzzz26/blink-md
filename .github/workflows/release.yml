name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: blink-md-linux-amd64
            binary: blink-md
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: blink-md-darwin-amd64
            binary: blink-md
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: blink-md-darwin-arm64
            binary: blink-md
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: blink-md-windows-amd64
            binary: blink-md.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: blink-md-mcp-linux-amd64
            binary: blink-md-mcp
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: blink-md-mcp-darwin-amd64
            binary: blink-md-mcp
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: blink-md-mcp-darwin-arm64
            binary: blink-md-mcp
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: blink-md-mcp-windows-amd64
            binary: blink-md-mcp.exe

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p blink-md --features mcp

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/"
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "dist/${{ matrix.artifact }}.zip" -Force
          certutil -hashfile "dist/${{ matrix.artifact }}.zip" SHA256 > "dist/${{ matrix.artifact }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish blink-md
        run: cargo publish -p blink-md --token ${{ secrets.CARGO_REGISTRY_TOKEN }}