name: Cross-Platform Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: blink-md-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/blink-md

  android:
    name: Build Android (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for Android
        run: cross build --release --target aarch64-linux-android -p blink-md

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: blink-md-aarch64-linux-android
          path: target/aarch64-linux-android/release/blink-md

  msrv:
    name: MSRV Check (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@1.75.0
      - name: Check MSRV
        run: cargo check --workspace || echo "MSRV check failed - may need dependency updates"
