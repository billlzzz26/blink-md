name: CLA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: Contributor License Agreement
        uses: cla-assistant/github-action@v2.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/billlzzz26/blink-md/blob/main/CLA.md
          branch: main
          allowlist: bot*, *@users.noreply.github.com, billlzzz26
