# GitHub PR label configuration
# https://github.com/actions/labeler (v4 config schema)
#
# actions/labeler@v4 only understands the flat "label: [glob, glob, ...]"
# format below — the "changed-files"/"any-glob-to-any-file" matcher block is
# a v5-only feature and silently fails to match under v4, which is why every
# PR used to get mislabeled. Keep these mapped to distinct areas of the repo
# so a PR gets the labels that actually describe what changed, not one
# catch-all. Semantic type (feature/fix/refactor) comes from the PR's Type of
# Change checklist and Conventional Commits prefix (see docs/AGENTS.md), not
# from path matching — path globs can't tell a fix from a feature.

documentation:
  - "**/*.md"
  - "docs/**"

ci:
  - ".github/workflows/**"

rust:
  - "src/**/*.rs"

tests:
  - "tests/**/*.rs"
  - "src/**/tests.rs"

dependencies:
  - "Cargo.toml"
  - "Cargo.lock"

scripts:
  - "scripts/**"

tooling:
  - ".claude/**"
  - "AGENTS.md"
