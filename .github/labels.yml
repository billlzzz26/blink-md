# GitHub PR label configuration
# https://github.com/actions/labeler

features:
  - docs:
      - changed-files:
          - any-glob-to-any-file: "docs/**"
  - code:
      - changed-files:
          - any-glob-to-any-file: "src/**/*.rs"
  - workflows:
      - changed-files:
          - any-glob-to-any-file: ".github/workflows/**"