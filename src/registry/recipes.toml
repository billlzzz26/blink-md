# Workflow definitions for blink-md skill generation
# Multi-step task sequences with real commands (block/markdown patterns)

[[recipes]]
name = "sync-docs"
title = "Sync Documentation"
description = "Two-way sync documentation between Notion, Markdown, and Mermaid."
category = "productivity"
services = ["notion", "md"]
steps = [
  "Export Notion page: `blink-md notion export --page-id PAGE_ID --format markdown`",
  "Compare with local file: `blink-md diff --notion PATH --local ORIGINAL.md`",
  "Sync changes: `blink-md sync --source notion --target markdown --page-id PAGE_ID`"
]

[[recipes]]
name = "convert-markdown"
title = "Convert Markdown"
description = "Convert markdown to other formats using Universal IR."
category = "utility"
services = ["md", "mmd", "notion"]
steps = [
  "Parse markdown: `blink-md md parse README.md`",
  "Convert to IR: `blink-md ir convert --input README.md --format ir`",
  "Convert to Notion: `blink-md convert --from ir --to notion --output page.json`",
  "Convert to Mermaid: `blink-md mmd generate --from ir --output diagram.mmd`"
]

[[recipes]]
name = "collect-data"
title = "Collect Data"
description = "Collect data from Lark spreadsheet and convert to Notion database."
category = "research"
services = ["lark", "notion"]
steps = [
  "Export Lark sheet: `blink-md lark export --sheet-id SHEET_ID --format csv`",
  "Convert to UniversalBlock: `blink-md ir import --source csv --target ir`",
  "Create Notion database: `blink-md notion create-database --from ir --name DATA`",
  "Sync regularly via crontab"
]

