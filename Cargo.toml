[package]
name = "notion-rs"
version = "0.1.0"
edition = "2021"
description = "Unofficial Notion API SDK for Rust (version 2026-03-11)"
license = "MIT"

[dependencies]
reqwest = { version = "0.12", features = ["json", "multipart"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["serde", "v4"] }
tokio = { version = "1", features = ["full"] }
thiserror = "1"
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.28"
anyhow = "1"
tokio-util = "0.7"
tokio-retry = "0.3"
governor = "0.6"
futures = "0.3"
pulldown-cmark = "0.12"

[dev-dependencies]
tokio = { version = "1", features = ["full", "rt"] }
wiremock = "0.6"
